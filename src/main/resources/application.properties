spring.application.name=mprs

spring.datasource.url=jdbc:postgresql://localhost:5432/mprs_db
spring.datasource.username=mprs_user
spring.datasource.password=mprs_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

spring.security.user.name=user
spring.security.user.password=password

# Allow large multipart uploads
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Tomcat form post limits (set to -1 for unlimited, or a large number)
server.tomcat.max-http-form-post-size=100MB

# Swallow size: how much Tomcat reads to discard on aborted requests (-1 = unlimited)
server.tomcat.max-swallow-size=100MB