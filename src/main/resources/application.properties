spring.application.name=mprs

# --- Database -----------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/mprs_db
spring.datasource.username=mprs_user
spring.datasource.password=mprs_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# --- JPA Batch ----------------------------------------------------
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

# --- Multipart Upload Limits --------------------------------------
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
server.tomcat.max-http-form-post-size=100MB
server.tomcat.max-swallow-size=100MB

# --- Logging (quiet frameworks, your code visible) ----------------
logging.level.root=INFO
logging.level.com.capgemini.mprs=DEBUG

logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=ERROR
logging.level.org.springdoc=WARN
logging.level.org.apache.catalina=WARN

# Disable all Hibernate SQL printing (the inserts/updates/etc)
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.hibernate.type=OFF

# --- Error Response Details (dev use only) ------------------------
server.error.include-message=always
server.error.include-stacktrace=always

